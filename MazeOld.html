<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">Almighty Maze Game</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount&display=swap" rel="stylesheet">

    <style>
        /* Original CSS for centering the canvas */
        div {
            height: 88vh;
            display: flex;
            justify-content: center; /* Horizontally center */
            align-items: center;    /* Vertically center */
        }
        canvas {
            border: 2px solid #333; /* Add a border to the canvas for better visibility */
            background-color: #eee; /* Default canvas background */
        }
        #heading {
            font-family: "Bitcount", system-ui;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings:
                "slnt" 0,
                "CRSV" 0.5,
                "ELSH" 0,
                "ELXP" 0;
        }

    </style>
</head>
<body>
    <h1 style="align-items: center; font-size: 45px;" id="heading"></h1>
    <div>
        <canvas id="canvas"></canvas>
    </div>    
    <script>
        // Get references to the canvas and its 2D rendering context
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let messages = [
            "I see you are worth this maze. You proved your worth. Good old Jonathan thought you were cooked. Go on, go to the next world.\n\n\n\n  - Anonymous Wizard"
        ];
        const music = new Audio("Soundtrack/MazeOfDoom.wav");
        const xpSound = new Audio("Soundtrack/coin.wav")
        const victorySound = new Audio("Soundtrack/Victory.wav")
        music.loop = true;
        moved = false;

        // Game state object - will be initialized with data from JSON
        let game = {
            currentLevel: 0, //To find world index, take floor of currentLevel/5
            canLoad: false,
            jsons: ["HuhMaze", "UhWat", "PuzzlingBarriers", "SomeTrustIssues", "HohoGetWrecked", "End"],
            board: [],          // Stores the maze layout
            colour: "#FFFFFF",  // Background color of the maze
            height: 300,        // Canvas height
            width: 300,         // Canvas width
            singleSquare: 30,   // Size of each cell in the maze
            doomEnds: false,
            worldEnd: false,
            worldEndCoords: {},
            mechanics: [],      // Array of game mechanics
            name: "MazeOfDoom", // Name of Level
            buff: 1,            // Multiplier for height and width
            winLocation: {},
            extraPointsLocation: {},
            player: {
                x: 1, y: 1,
                vision: "unlimited",
                facing: "N",
                effects: [],
                extraPoints: false
            },

            draw: function() {

                ctx.fillStyle = game.colour; // Use the colour from JSON for the background
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let row = 0; row < game.board.length; row++) {
                    // Iterate through each character (cell) in the row
                    for (let col = 0; col < game.board[row].length; col++) {
                        const cell = game.board[row][col];
                        const x = col * game.singleSquare; // X position on canvas
                        const y = row * game.singleSquare; // Y position on canvas

                        // Determine color based on the cell type
                        switch (cell) {
                            case '#': // Wall
                                ctx.fillStyle = "black";
                                break;
                            case ' ': // Path
                                ctx.fillStyle = game.colour; // Path color
                                break;
                            case 'D': // Through Wall
                                ctx.fillStyle = "#010101";
                                break;
                            case 'F': // Fake Path
                                ctx.fillStyle = "#FEFEEE"
                                break;
                            case 'E': // Exit
                            case 'H': //Fake Exit
                                ctx.fillStyle = "green";
                                break;
                            default: // Unknown character, draw as path
                                ctx.fillStyle = game.colour;
                                break;
                        }
                        // Draw the square for the current cell
                        ctx.fillRect(x, y, game.singleSquare, game.singleSquare);
                    }
                }

                ctx.fillStyle = "red"; // Player color
                ctx.fillRect(
                    game.player.x * game.singleSquare, 
                    game.player.y * game.singleSquare, 
                    game.singleSquare, 
                    game.singleSquare
                );
                ctx.fillStyle = "yellow";
                if (!game.player.extraPoints) {
                    ctx.fillRect(
                        game.extraPointsLocation.x * game.singleSquare, 
                        game.extraPointsLocation.y * game.singleSquare, 
                        game.singleSquare, 
                        game.singleSquare
                    );
                }
                if (game.worldEnd) {
                    ctx.fillRect(
                    game.worldEndCoords.x * game.singleSquare, 
                    game.worldEndCoords.y * game.singleSquare, 
                    game.singleSquare, 
                    game.singleSquare
                    );
                }
            },

            checkWin: function() {

                if (this.player.x == this.extraPointsLocation.x && this.player.y == this.extraPointsLocation.y && !this.player.extraPoints) {
                    this.player.extraPoints = true;
                    xpSound.play();
                    ctx.fillStyle = game.colour;
                    ctx.fillRect(this.extraPointsLocation.x * game.singleSquare, this.extraPointsLocation.y * game.singleSquare, game.singleSquare, game.singleSquare);
                }

                if (this.worldEnd && this.player.x == this.worldEndCoords.x && this.player.y == this.worldEndCoords.y) {
                    alert(messages[Math.floor(game.currentLevel/5)]);
                    game.move("N")
                }

                if (this.player.x == this.winLocation.x && this.player.y == this.winLocation.y) {
                    music.pause();
                    victorySound.play();
                    victorySound.addEventListener('ended', () => {
                        setTimeout(() => music.play(), 50);
                        // Do something else after the sound ends
                    });
                    return true;
                } 
                return false;
            },
            

            // The core game loop function
            tick: function() {
                if (moved) music.play();
                document.getElementById("title").innerHTML = game.name;
                document.getElementById("heading").innerHTML = game.name;
                // Update canvas dimensions based on game state
                canvas.height = game.height;
                canvas.width = game.width;

                // Clear the canvas by filling it with the game's background color

                game.draw()
                

                const wonLevel = game.checkWin();
                // Schedule the next tick. IMPORTANT: Pass 'game.tick' as a reference, not 'game.tick()'
                var timeout = setTimeout(game.tick, 50); // Calls tick every 50 milliseconds
                if (wonLevel) {
                    game.draw();
                    clearTimeout(timeout);
                    game.endLevel();
                }
            },

            move: function(direction) {
                moved = true;
                // Keep track of the player's current position
                let currentX = this.player.x;
                let currentY = this.player.y;

                // Calculate the next potential position
                if (direction === "N") currentY--;
                else if (direction === "S") currentY++;
                else if (direction === "W") currentX--;
                else if (direction === "E") currentX++;

                // Collision Detection: Check if the new spot is a wall ('#')
                if (this.board[currentY][currentX] !== '#' && this.board[currentY][currentX] !== 'F' && game.height/game.singleSquare > currentY && currentY >= 0 && (game.width/game.singleSquare) > currentX && currentX >= 0 ) {
                    // If it's not a wall, update the player's position
                    this.player.x = currentX;
                    this.player.y = currentY;
                }
                // if (this.player.x * this.singleSquare)
            },

            waitForCanLoad: function() {
                return new Promise(resolve => {
                    const checkInterval = setInterval(() => {
                        if (game.canLoad) {
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 50); // Check every 100 milliseconds
                });
            },

            endLevel : async function() { // Make endLevel an async function
                // First, ensure canLoad is set to false before waiting for it to become true for the next level
                // This prevents immediate re-triggering if it was true from the previous level logic.
                game.canLoad = false;
                game.player.extraPoints ? alert("3/3 star winner!") : alert("2/3 star winner!");

                // Wait until game.canLoad becomes true
                await this.waitForCanLoad(); // Use 'await' here

                // Once game.canLoad is true, proceed with loading the next level

                // Check if there are more levels before attempting to load
                if (game.currentLevel < game.jsons.length) {
                    ctx.fillStyle = this.colour;
                    ctx.clearRect(0, 0, this.width, this.height);
                    game.currentLevel++;
                    game.player.extraPoints = false;
                    loadLevel(game.jsons[game.currentLevel]);
                } 
                else {
                    // Handle game completion (e.g., all levels finished)
                    alert("The next world is locked... \n\n\n\n\n\n\n\n\n\nTip: Come back later, and see if it's unlocked");
                    // Optionally reset game or show a final screen
                    // Reset for replay
                    // You might want to load the first level again or a specific "game over" screen
                    // loadLevel(game.jsons[game.currentLevel]);
                }
            }

        };

        // Function to load the level data from the JSON file
        async function loadLevel(levelName) {
            try {
                // Fetch the JSON file
                const response = await fetch("Levels/" + levelName + ".json");
                // Check if the fetch was successful
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                // Parse the JSON data
                const levelData = await response.json();

                // Update the game state with the loaded level data
                game.board = levelData.board;
                game.colour = levelData.colour;
                game.height = levelData.height;
                game.width = levelData.width;
                game.singleSquare = levelData.singleSquare;
                game.doomEnds = levelData.doomEnds;
                game.worldEnd = levelData.worldEnd;
                if (game.worldEnd) {
                    game.worldEndCoords.x = levelData.worldEndCoords.x;
                    game.worldEndCoords.y = levelData.worldEndCoords.y;
                }
                game.player.vision = levelData.vision;
                game.mechanics = levelData.mechanics;
                game.name = levelData.levelName;
                game.player.effects = levelData.effects;
                game.buff = levelData.buff;
                game.player.facing = levelData.facing;
                game.player.x = levelData.startingSquare.x;
                game.player.y = levelData.startingSquare.y;
                game.winLocation = levelData.winLocation;
                if (levelData.extraPoints !== null) {
                    game.extraPointsLocation.x = levelData.extraPoints.x;
                    game.extraPointsLocation.y = levelData.extraPoints.y;
                }
                else {
                    game.extraPointsLocation.x = game.player.x;
                    game.extraPointsLocation.y = game.player.y;
                }
                
                // Set canvas initial dimensions based on loaded data
                // console.log(game.buff);
                // console.log(game.height);
                game.width = game.width * game.buff;
                game.height = game.height * game.buff;
                game.singleSquare = game.singleSquare * game.buff;
                // console.log(game.height);

                // Start the game loop after the level data is loaded
                game.tick();

            } catch (error) {
                console.error("Failed to load level data:", error);
                // Optionally, display an error message on the canvas or console
                ctx.fillStyle = "red";
                ctx.font = "20px Arial";
                ctx.fillText("Error loading level!", 10, 50);
            }
        }
        // Add this function right after the loadLevel function
        function handleKeyPress(event) {
            switch (event.key) {
                case "ArrowUp":
                case "w":
                    game.move("N");
                    break;
                case "ArrowDown":
                case "s":
                    game.move("S");
                    break;
                case "ArrowLeft":
                case "a":
                    game.move("W");
                    break;
                case "ArrowRight":
                case "d":
                    game.move("E");
                    break;
                case "l":
                case "Enter":
                    game.canLoad = true;
                    break;
                // case "p":
                //     console.log("P Clicked!")
                //     // switch (musicPlaying) {
                //     //     case true:
                //     musicPlaying = false;
                //     music.pause();
                //     //     case false:
                //     //         musicPlaying = true;
                //     //         music.play();
                //     //     default:
                //     //         return;
                //     // }
                //     break;
                // case "r":
                //     musicPlaying = true;
                //     music.play();
                default:
                return; // Do nothing for other keys
            }
            event.preventDefault(); // Add this line
        }

        // Attach the event listener to the document
        document.addEventListener('keydown', handleKeyPress);

        // Load the level when the window has fully loaded
        window.onload = function() {
            loadLevel(game.jsons[game.currentLevel])
        }
    
    </script>
</body>
</html>
